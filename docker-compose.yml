services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: el_atelier_artesanal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d el_atelier_artesanal']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/el_atelier_artesanal
      DATABASE_SSL: 'false'
      FRONTEND_ORIGINS: http://localhost:5173
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/gcp-service-account.json
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST}:/app/secrets/gcp-service-account.json:ro
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_BASE_URL: http://localhost:3001
      CHOKIDAR_USEPOLLING: 'true'
    depends_on:
      - backend
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
