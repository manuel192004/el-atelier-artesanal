services:
  - type: web
    name: el-atelier-backend
    runtime: node
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: el-atelier-db
          property: connectionString
      - key: DATABASE_SSL
        value: true
      - key: FRONTEND_ORIGINS
        sync: false
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: USERS_DUAL_WRITE_FILE
        value: false
      - key: USERS_FILE_FALLBACK_READS
        value: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON_BASE64
        sync: false
      - key: GOOGLE_CLOUD_PROJECT_ID
        sync: false
      - key: GOOGLE_CLOUD_LOCATION
        value: us-central1
      - key: GOOGLE_CLOUD_PUBLISHER
        value: google
      - key: GOOGLE_CLOUD_MODEL
        value: imagen-4.0-generate-001
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: 2024-10-21
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ASSISTANT_MODEL
        value: gpt-5.4-mini

databases:
  - name: el-atelier-db
