services:
  - type: web
    name: orviane-backend
    runtime: node
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orviane-db
          property: connectionString
      - key: DATABASE_SSL
        value: true
      - key: FRONTEND_ORIGINS
        sync: false
      - key: AUTH_JWT_SECRET
        generateValue: true
      - key: OPERATIONS_ACCESS_TOKEN
        sync: false
      - key: OPERATIONS_ADMIN_EMAILS
        sync: false
      - key: OPERATIONS_ADMIN_SEED_EMAIL
        sync: false
      - key: OPERATIONS_ADMIN_SEED_PASSWORD
        sync: false
      - key: OPERATIONS_ADMIN_SEED_FULL_NAME
        value: Administrador Orviane
      - key: OPERATIONS_ADMIN_SEED_WHATSAPP
        sync: false
      - key: USERS_DUAL_WRITE_FILE
        value: false
      - key: USERS_FILE_FALLBACK_READS
        value: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON_BASE64
        sync: false
      - key: GOOGLE_CLOUD_PROJECT_ID
        sync: false
      - key: GOOGLE_CLOUD_LOCATION
        value: us-central1
      - key: GOOGLE_CLOUD_PUBLISHER
        value: google
      - key: GOOGLE_CLOUD_MODEL
        value: imagen-4.0-generate-001
      - key: GOOGLE_SIGN_IN_ENABLED
        value: false
      - key: ASSISTANT_V2_MODEL
        value: gemini-2.5-flash
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ASSISTANT_MODEL
        value: gpt-5-mini
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime
      - key: OPENAI_REALTIME_VOICE
        value: marin
      - key: OPENAI_TRANSCRIPTION_MODEL
        value: gpt-4o-mini-transcribe
      - key: ORVIA_VALUATION_METAL_PRICES_COP_JSON
        sync: false

databases:
  - name: orviane-db
